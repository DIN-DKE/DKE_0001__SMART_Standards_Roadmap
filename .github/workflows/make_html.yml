name: Roadmap HTML (No Puppeteer Mermaid)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Pandoc + Python
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3 python3-pip

      # ----------------------------
      # Extract Mermaid blocks
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          mkdir -p build_out
          python3 - << 'EOF'
import re
from pathlib import Path

text = Path("idis-roadmap.md").read_text()

blocks = re.findall(r"```mermaid(.*?)```", text, re.S)

for i, b in enumerate(blocks):
    Path(f"build_out/diagram{i}.mmd").write_text(b.strip())
EOF

      # ----------------------------
      # Convert Mermaid → SVG via mermaid.ink
      # ----------------------------
      - name: Convert Mermaid to SVG (remote renderer)
        run: |
          mkdir -p build_out/svg

          for f in build_out/*.mmd; do
            encoded=$(python3 - << EOF
import urllib.parse, sys
print(urllib.parse.quote(open("${f}").read()))
EOF
)
            curl -s "https://mermaid.ink/svg/$encoded" > "$f.svg"
          done

      # ----------------------------
      # Convert Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG into HTML
      # ----------------------------
      - name: Inject SVG
        run: |
          python3 - << 'EOF'
from bs4 import BeautifulSoup
from pathlib import Path

html = Path("build_out/base.html").read_text()
soup = BeautifulSoup(html, "html.parser")

svg_files = sorted(Path("build_out").glob("diagram*.mmd.svg"))
code_blocks = soup.find_all("code")

i = 0
for c in code_blocks:
    if "mermaid" in c.text and i < len(svg_files):
        svg = BeautifulSoup(svg_files[i].read_text(), "html.parser")
        c.replace_with(svg)
        i += 1

Path("build_out/final.html").write_text(str(soup))
EOF

      # ----------------------------
      # Pages output
      # ----------------------------
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Pages
        uses: actions/deploy-pages@v4
