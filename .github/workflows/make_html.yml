name: Roadmap HTML (No Puppeteer, Stable)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
      - "build/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3 python3-pip curl

      - name: Install Python deps
        run: |
          pip install beautifulsoup4

      # ----------------------------
      # Extract Mermaid (SAFE SCRIPT)
      # ----------------------------
      - name: Extract Mermaid
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Convert Mermaid → SVG via mermaid.ink
      # ----------------------------
      - name: Render Mermaid via API
        run: |
          python3 build/render_mermaid.py build_out

      # ----------------------------
      # Markdown → HTML
      # ----------------------------
      - name: Pandoc HTML
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG (safe DOM merge)
      # ----------------------------
      - name: Inject SVG
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Pages output
      # ----------------------------
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Pages
        uses: actions/deploy-pages@v4
