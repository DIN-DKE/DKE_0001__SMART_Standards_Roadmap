name: Roadmap HTML (Stable Mermaid CLI)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      # ----------------------------
      # Extract Mermaid
      # ----------------------------
      - name: Extract diagrams
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Render with FIXED sandbox config
      # ----------------------------
      - name: Render Mermaid (FIXED)
        run: |
          for f in build_out/*.mmd; do
            npx mmdc \
              -i "$f" \
              -o "$f.svg" \
              --puppeteerConfigArgs='{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
          done

      # ----------------------------
      # Pandoc
      # ----------------------------
      - name: HTML build
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG
      # ----------------------------
      - name: Inject SVG
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Pages
      # ----------------------------
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
