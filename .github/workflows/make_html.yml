name: Build Roadmap HTML with Mermaid

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Setup Node.js (Mermaid CLI compatible)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      # ----------------------------
      # Extract Mermaid blocks
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          mkdir -p build_out
          python3 - << 'EOF'
import re
from pathlib import Path

text = Path("idis-roadmap.md").read_text()

blocks = re.findall(r"```mermaid(.*?)```", text, re.S)

for i, b in enumerate(blocks):
    Path(f"build_out/diagram{i}.mmd").write_text(b.strip())
EOF

      # ----------------------------
      # Render Mermaid → SVG
      # ----------------------------
      - name: Render Mermaid diagrams
        run: |
          for f in build_out/*.mmd; do
            npx mmdc -i "$f" -o "$f.svg"
          done

      # ----------------------------
      # Convert Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG into HTML (safe DOM merge)
      # ----------------------------
      - name: Inject SVG into HTML
        run: |
          python3 - << 'EOF'
from bs4 import BeautifulSoup
from pathlib import Path

html = Path("build_out/base.html").read_text()
soup = BeautifulSoup(html, "html.parser")

svg_files = sorted(Path("build_out").glob("diagram*.mmd.svg"))
code_blocks = soup.find_all("code")

i = 0
for code in code_blocks:
    if "mermaid" in code.text:
        if i < len(svg_files):
            svg = svg_files[i].read_text()
            new_svg = BeautifulSoup(svg, "html.parser")
            code.replace_with(new_svg)
            i += 1

Path("build_out/final.html").write_text(str(soup))
EOF

      # ----------------------------
      # Prepare GitHub Pages
      # ----------------------------
      - name: Prepare Pages output
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
