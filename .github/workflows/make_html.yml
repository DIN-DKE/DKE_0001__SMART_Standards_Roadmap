name: Build Roadmap HTML with Mermaid (stable)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
      - "build/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      # ----------------------------
      # Extract Mermaid
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Render Mermaid → SVG
      # ----------------------------
      - name: Render Mermaid diagrams
        run: |
          for f in build_out/*.mmd; do
            npx mmdc -i "$f" -o "$f.svg"
          done

      # ----------------------------
      # Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG safely
      # ----------------------------
      - name: Inject SVG into HTML
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Pages output
      # ----------------------------
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
