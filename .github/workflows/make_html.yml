name: Build Roadmap HTML (No Puppeteer, jsdom)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
      - "build/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # System Dependencies
      # ----------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3 python3-pip

      # ----------------------------
      # Python Dependencies
      # ----------------------------
      - name: Install Python deps
        run: |
          pip install beautifulsoup4

      # ----------------------------
      # Node Setup
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid + jsdom
        run: |
          npm install mermaid jsdom

      # ----------------------------
      # Extract Mermaid blocks
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Render Mermaid via jsdom (NO Puppeteer)
      # ----------------------------
      - name: Render Mermaid
        run: |
          node build/render_mermaid.js

      # ----------------------------
      # Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone \
            --from markdown+pipe_tables+grid_tables \
            --to html5

      # ----------------------------
      # Inject SVG + CSS
      # ----------------------------
      - name: Inject SVG into HTML
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Prepare GitHub Pages
      # ----------------------------
      - name: Prepare Pages output
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
