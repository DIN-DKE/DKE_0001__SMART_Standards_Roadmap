name: Build & Deploy Markdown Roadmap (Stable Mermaid)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/md-to-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Setup Node.js (upgrade for Mermaid CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      - name: Convert Markdown → HTML (no mermaid processing)
        run: |
          pandoc idis-roadmap.md \
            -o idis-roadmap.html \
            --standalone

      - name: Render Mermaid blocks to SVG
        run: |
          mkdir -p mermaid-out

          # Extract mermaid blocks and render them
          awk '/```mermaid/{flag=1; i++ ; file="mermaid-out/diagram"i".mmd"; next} /```/{flag=0} flag {print > file}' idis-roadmap.md

          for f in mermaid-out/*.mmd; do
            npx mmdc -i "$f" -o "$f.svg"
          done

      - name: Inject SVG into HTML
        run: |
          python3 - << 'EOF'
import re
from pathlib import Path

html = Path("idis-roadmap.html").read_text()

for svg in Path("mermaid-out").glob("*.svg"):
    mmd_file = svg.with_suffix(".mmd").read_text()

    svg_content = svg.read_text()

    block = "```mermaid\n" + mmd_file + "\n```"

    html = html.replace(block, svg_content)

Path("idis-roadmap.html").write_text(html)
EOF

      - name: Prepare Pages folder
        run: |
          mkdir -p public
          mv idis-roadmap.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
