name: Build Docs with Mermaid (Stable OSPRO Pipeline)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Minimal system dependencies (CI-stable)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            pandoc \
            libnss3

      # Install Mermaid CLI
      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      # Puppeteer sandbox configuration (required for CI environments)
      - name: Create Puppeteer config
        run: |
          cat <<EOF > puppeteer-config.json
          {
            "args": [
              "--no-sandbox",
              "--disable-setuid-sandbox"
            ]
          }
          EOF

      # Prepare build directory
      - name: Prepare build directory
        run: mkdir -p build/img

      # Render Mermaid diagrams → SVG
      - name: Render Mermaid diagrams
        run: python3 scripts/render_mermaid.py

      # Convert Markdown → HTML
      - name: Build HTML with Pandoc
        run: |
          pandoc build/idis-roadmap.md \
            -o build/idis-roadmap.html \
            --standalone \
            --metadata title="OSPRO Documentation"

      # Upload artifact for GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
