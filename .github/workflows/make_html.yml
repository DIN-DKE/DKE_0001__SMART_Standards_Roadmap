name: Build Roadmap HTML (Mermaid CLI Stable)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
      - "build/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # System Dependencies
      # ----------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3 python3-pip

      - name: Install Python deps
        run: |
          pip install beautifulsoup4

      # ----------------------------
      # Node Setup (wichtig: Node 22 wegen mmdc)
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      # ----------------------------
      # Puppeteer Config (FIX)
      # ----------------------------
      - name: Create Puppeteer config
        run: |
          echo '{
            "args": ["--no-sandbox", "--disable-setuid-sandbox"]
          }' > pptr.json

      # ----------------------------
      # Extract Mermaid blocks
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Render Mermaid (STABLE)
      # ----------------------------
      - name: Render Mermaid diagrams
        run: |
          for f in build_out/*.mmd; do
            npx mmdc \
              -i "$f" \
              -o "$f.svg" \
              -p pptr.json
          done

      # ----------------------------
      # Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone \
            --from markdown+pipe_tables+grid_tables \
            --to html5

      # ----------------------------
      # Inject SVG + CSS
      # ----------------------------
      - name: Inject SVG into HTML
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Prepare GitHub Pages
      # ----------------------------
      - name: Prepare Pages output
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
