name: Build Markdown to HTML (with Mermaid)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/md-to-html.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid CLI and Pandoc Mermaid Filter
        run: |
          npm install -g @mermaid-js/mermaid-cli
          npm install -g pandoc-mermaid-filter

      - name: Convert Markdown to HTML (with Mermaid support)
        run: |
          pandoc idis-roadmap.md \
            -o idis-roadmap.html \
            --from markdown \
            --to html5 \
            --filter pandoc-mermaid

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: idis-roadmap-html
          path: idis-roadmap.html

      - name: Commit generated HTML (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add idis-roadmap.html
          git commit -m "Auto-generate idis-roadmap.html from Markdown" || echo "No changes"
          git push
