name: Roadmap HTML (Zero Dependency Mermaid)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # System deps only
      # ----------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3 nodejs npm

      # ----------------------------
      # Install Mermaid ESM renderer (NO CHROME)
      # ----------------------------
      - name: Install Mermaid runtime
        run: |
          npm install mermaid

      # ----------------------------
      # Extract Mermaid blocks
      # ----------------------------
      - name: Extract Mermaid
        run: |
          python3 build/extract_mermaid.py idis-roadmap.md build_out

      # ----------------------------
      # Render Mermaid → SVG (NO PUPPETEER)
      # ----------------------------
      - name: Render Mermaid (pure JS runtime)
        run: |
          node build/render_mermaid.js

      # ----------------------------
      # Markdown → HTML
      # ----------------------------
      - name: Pandoc HTML
        run: |
          mkdir -p build_out
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone\
            --from markdown+pipe_tables+grid_tables \
            --to html5

      # ----------------------------
      # Inject SVG
      # ----------------------------
      - name: Inject SVG
        run: |
          python3 build/inject_svg.py build_out

      # ----------------------------
      # Pages
      # ----------------------------
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
