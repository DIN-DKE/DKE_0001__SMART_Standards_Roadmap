name: Build Roadmap HTML with Mermaid (stable)

on:
  push:
    paths:
      - "idis-roadmap.md"
      - ".github/workflows/make_html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli

      # ----------------------------
      # Extract Mermaid blocks (SAFE VERSION)
      # ----------------------------
      - name: Extract Mermaid diagrams
        run: |
          mkdir -p build_out
          python3 -c "import re; from pathlib import Path; \
text = Path('idis-roadmap.md').read_text(); \
blocks = re.findall(r'''```mermaid(.*?)```''', text, re.S); \
[Path(f'build_out/diagram{i}.mmd').write_text(b.strip()) for i,b in enumerate(blocks)]"

      # ----------------------------
      # Render Mermaid → SVG
      # ----------------------------
      - name: Render Mermaid diagrams
        run: |
          for f in build_out/*.mmd; do
            npx mmdc -i "$f" -o "$f.svg"
          done

      # ----------------------------
      # Convert Markdown → HTML
      # ----------------------------
      - name: Pandoc conversion
        run: |
          pandoc idis-roadmap.md \
            -o build_out/base.html \
            --standalone

      # ----------------------------
      # Inject SVG safely (DOM merge)
      # ----------------------------
      - name: Inject SVG into HTML
        run: |
          python3 -c "from bs4 import BeautifulSoup; from pathlib import Path; \
html = Path('build_out/base.html').read_text(); \
soup = BeautifulSoup(html, 'html.parser'); \
svg_files = sorted(Path('build_out').glob('diagram*.mmd.svg')); \
code_blocks = soup.find_all('code'); \
i = 0; \
for c in code_blocks: \
    if 'mermaid' in c.text and i < len(svg_files): \
        svg = BeautifulSoup(svg_files[i].read_text(), 'html.parser'); \
        c.replace_with(svg); \
        i += 1; \
Path('build_out/final.html').write_text(str(soup))"

      # ----------------------------
      # Prepare Pages
      # ----------------------------
      - name: Prepare Pages output
        run: |
          mkdir -p public
          cp build_out/final.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
