name: Build Docs with Mermaid (Stable)

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Systemabhängigkeiten (inkl. Chromium + notwendige libs)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            python3 \
            chromium-browser \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxrandr2 \
            libgbm1 \
            libasound2

      # Mermaid CLI installieren
      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      # Puppeteer-Konfiguration für CI (entscheidend!)
      - name: Create Puppeteer config (no sandbox)
        run: |
          cat <<EOF > puppeteer-config.json
          {
            "args": ["--no-sandbox", "--disable-setuid-sandbox"]
          }
          EOF

      # Build-Verzeichnis
      - name: Prepare build directory
        run: mkdir -p build/img

      # Mermaid-Rendering (nutzt dein Python-Skript)
      - name: Render Mermaid diagrams
        run: |
          export PUPPETEER_CONFIG=puppeteer-config.json
          python3 scripts/render_mermaid.py

      # Markdown → HTML
      - name: Convert Markdown to HTML
        run: |
          pandoc build/idis-roadmap.md \
            -o build/idis-roadmap.html \
            --standalone \
            --metadata title="OSPRO Documentation"

      # Deployment
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: build
