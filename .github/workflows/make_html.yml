name: Build Docs with Mermaid (Stable OSPRO Pipeline)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            pandoc \
            libnss3

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Create Puppeteer config
        run: |
          cat <<EOF > puppeteer-config.json
          {
            "args": [
              "--no-sandbox",
              "--disable-setuid-sandbox"
            ]
          }
          EOF

      - name: Prepare build directory
        run: mkdir -p build/img

      - name: Render Mermaid diagrams
        run: python3 scripts/render_mermaid.py

      # 🔴 FIX: Pages expects index.html
      - name: Build HTML with Pandoc
        run: |
          pandoc build/idis-roadmap.md \
            -o build/index.html \
            --standalone \
            --metadata title="OSPRO Documentation"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
